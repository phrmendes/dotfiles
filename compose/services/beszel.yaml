services:
  beszel:
    image: docker.io/henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - 127.0.0.1:8090:8090
    volumes:
      - beszel_data:/beszel_data
      - /mnt/external/.beszel:/extra-filesystems/sdb:ro
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      start_period: 5s
      interval: 120s
    labels:
      - diun.enable=true

volumes:
  beszel_data:
