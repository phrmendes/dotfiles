services:
  diun:
    image: docker.io/crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve
    secrets:
      - source: diun-ssh-key
        target: /root/.ssh/id_ed25519
    volumes:
      - diun_data:/data
      - ./files/diun/update.sh:/scripts/update.sh:ro
    environment:
      - TZ=${TZ}
      - DIUN_WATCH_WORKERS=20
      - DIUN_WATCH_SCHEDULE=0 */6 * * *
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_ENDPOINT=tcp://socket-proxy:2375
      - DIUN_NOTIF_GOTIFY_ENDPOINT=${GOTIFY_URL}
      - DIUN_NOTIF_GOTIFY_TOKEN=${GOTIFY_DIUN_TOKEN}
      - DIUN_NOTIF_SCRIPT_CMD=/scripts/update.sh
      - DIUN_SSH_USER=${DIUN_SSH_USER}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x diun || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - diun.enable=true
    depends_on:
      socket-proxy:
        condition: service_healthy

secrets:
  diun-ssh-key:
    file: ${AGE_SECRETS_PATH}/diun-ssh-key

volumes:
  diun_data:
