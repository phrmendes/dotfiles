services:
  linkding:
    image: docker.io/sissbruecker/linkding:latest-plus
    container_name: linkding
    restart: unless-stopped
    environment:
      - LD_DB_DATABASE=linkding
      - LD_DB_ENGINE=postgres
      - LD_DB_HOST=postgres
      - LD_DB_PORT=5432
      - LD_DB_USER=${POSTGRES_USER}
      - LD_DB_PASSWORD=${POSTGRES_PASSWORD}
      - LD_SUPERUSER_NAME=${LD_SUPERUSER_NAME}
      - LD_SUPERUSER_PASSWORD=${LD_SUPERUSER_PASSWORD}
    volumes:
      - linkding_data:/etc/linkding/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - diun.enable=true

volumes:
  linkding_data:
