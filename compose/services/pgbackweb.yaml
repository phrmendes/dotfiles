services:
  pgbackweb:
    image: docker.io/eduardolat/pgbackweb:latest
    container_name: pgbackweb
    restart: unless-stopped
    volumes:
      - postgres_dumps:/backups
    environment:
      - TZ=${TZ}
      - PBW_ENCRYPTION_KEY=${PBW_ENCRYPTION_KEY}
      - PBW_POSTGRES_CONN_STRING=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pgbackweb?sslmode=disable
    healthcheck:
      test:
        ["CMD", "wget", "-qO/dev/null", "http://localhost:8085/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - diun.enable=true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_dumps:
