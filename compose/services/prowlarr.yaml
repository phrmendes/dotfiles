services:
  prowlarr:
    image: docker.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
    volumes:
      - prowlarr_config:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - diun.enable=true

volumes:
  prowlarr_config:
