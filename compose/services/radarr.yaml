services:
  radarr:
    image: docker.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
    volumes:
      - radarr_config:/config
      - /mnt/external/movies:/movies
      - /mnt/external/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - diun.enable=true

volumes:
  radarr_config:
