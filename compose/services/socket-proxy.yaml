services:
  socket-proxy:
    image: docker.io/linuxserver/socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped
    read_only: true
    ports:
      - 127.0.0.1:2375:2375
    environment:
      - SOCKET_PATH=/docker.sock
      - CONTAINERS=1 # beszel, diun container management
      - EVENTS=1 # needed for diun and beszel event monitoring
      - IMAGES=1 # diun image updates
      - INFO=1 # system information for monitoring
      - NETWORKS=1 # container networking info
      - POST=1 # needed for container operations
      - SYSTEM=1 # beszel system monitoring
      - VOLUMES=1 # volume management
    volumes:
      - /var/run/docker.sock:/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2375/version"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - diun.enable=true
    tmpfs:
      - /run
